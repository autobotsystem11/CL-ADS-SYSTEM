<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADS REPORT — CL SDN BHD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a14; --bg2: #13131f; --bg3: #1c1c2e;
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9; --muted: #64748b;
      --orange: #f97316; --blue: #3b82f6; --green: #22c55e; --purple: #a855f7; --pink: #ec4899;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* Nav */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; border-bottom: 1px solid var(--border);
      background: rgba(10,10,20,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 50;
    }
    .nav-left { display: flex; align-items: center; gap: 10px; }
    .logo-badge {
      width: 34px; height: 34px; border-radius: 8px; background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 12px; color: #fff;
    }
    .nav-title { font-weight: 800; font-size: 15px; }
    .nav-sub { color: var(--muted); font-size: 11px; margin-top: 1px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .client-name { font-size: 13px; color: var(--muted); }
    .logout-btn {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 12px; padding: 6px 12px; cursor: pointer;
    }
    .logout-btn:hover { color: var(--text); }

    /* Layout */
    .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

    /* Range filter */
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .topbar h1 { font-size: 20px; font-weight: 800; }
    .range-tabs { display: flex; gap: 6px; }
    .range-tab {
      padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
      background: var(--bg3); border: 1px solid var(--border); color: var(--muted); transition: all 0.15s;
    }
    .range-tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }

    /* Stat cards */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-sub { font-size: 11px; color: var(--muted); }
    .c-orange { color: var(--orange); }
    .c-blue   { color: var(--blue); }
    .c-green  { color: var(--green); }
    .c-purple { color: var(--purple); }
    .c-pink   { color: var(--pink); }

    /* KPI cards (ROAS/ROI/CPC/CPA) */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    @media (max-width: 768px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    .kpi-card {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px;
      position: relative; overflow: hidden;
    }
    .kpi-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .kpi-card.roas::before { background: linear-gradient(90deg, var(--orange), var(--pink)); }
    .kpi-card.roi::before  { background: linear-gradient(90deg, var(--green), var(--blue)); }
    .kpi-card.cpc::before  { background: linear-gradient(90deg, var(--blue), var(--purple)); }
    .kpi-card.cpa::before  { background: linear-gradient(90deg, var(--purple), var(--pink)); }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .kpi-value { font-size: 26px; font-weight: 800; margin-bottom: 2px; }
    .kpi-desc  { font-size: 11px; color: var(--muted); }

    /* Card */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 16px; }

    /* Chart */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 640px) { .chart-grid { grid-template-columns: 1fr; } }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 10px 12px; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 12px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 50px; }
    .badge-blue   { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
    .badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); }

    /* Spend banner */
    .spend-banner {
      background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(168,85,247,0.08));
      border: 1px solid rgba(249,115,22,0.25); border-radius: 14px; padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .spend-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .spend-value { font-size: 32px; font-weight: 800; color: var(--orange); }

    /* Loading */
    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }
    .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <div class="logo-badge">CL</div>
    <div>
      <div class="nav-title">ADS REPORT</div>
      <div class="nav-sub">CL SDN BHD · 广告效果报告</div>
    </div>
  </div>
  <div class="nav-right">
    <span class="client-name" id="client-name-nav">—</span>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>
</nav>

<div class="page" id="main-content" style="display:none">

  <div class="topbar">
    <h1>📊 广告效果总览</h1>
    <div class="range-tabs">
      <button class="range-tab" onclick="setDays(7,this)">7天</button>
      <button class="range-tab active" onclick="setDays(30,this)">30天</button>
      <button class="range-tab" onclick="setDays(90,this)">90天</button>
    </div>
  </div>

  <!-- Spend Banner -->
  <div class="spend-banner">
    <div>
      <div class="spend-label">广告套餐 / 当前计划</div>
      <div class="spend-value" id="kpi-spend">—</div>
    </div>
    <div style="text-align:right">
      <div class="spend-label" style="text-align:right">套餐名称</div>
      <div style="font-size:15px;font-weight:700;color:var(--text)" id="kpi-package">—</div>
    </div>
  </div>

  <!-- Main stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">链接点击</div>
      <div class="stat-value c-orange" id="s-clicks">—</div>
      <div class="stat-sub">广告点击总数</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">网站访问</div>
      <div class="stat-value c-blue" id="s-visits">—</div>
      <div class="stat-sub">Pixel 追踪</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">询问 / 表单</div>
      <div class="stat-value c-purple" id="s-leads">—</div>
      <div class="stat-sub">潜在客户</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">成功转化</div>
      <div class="stat-value c-green" id="s-conv">—</div>
      <div class="stat-sub">下单 / 付款</div>
    </div>
  </div>

  <!-- KPI cards -->
  <div class="kpi-grid">
    <div class="kpi-card roas">
      <div class="kpi-label">ROAS</div>
      <div class="kpi-value c-orange" id="kpi-roas">—</div>
      <div class="kpi-desc">广告回报率</div>
    </div>
    <div class="kpi-card roi">
      <div class="kpi-label">ROI</div>
      <div class="kpi-value c-green" id="kpi-roi">—</div>
      <div class="kpi-desc">投资回报率</div>
    </div>
    <div class="kpi-card cpc">
      <div class="kpi-label">CPC</div>
      <div class="kpi-value c-blue" id="kpi-cpc">—</div>
      <div class="kpi-desc">每次点击成本</div>
    </div>
    <div class="kpi-card cpa">
      <div class="kpi-label">CPA</div>
      <div class="kpi-value c-purple" id="kpi-cpa">—</div>
      <div class="kpi-desc">每次转化成本</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-grid">
    <div class="card">
      <div class="card-title">每日点击趋势</div>
      <canvas id="chart-clicks" height="120"></canvas>
    </div>
    <div class="card">
      <div class="card-title">每日访问趋势</div>
      <canvas id="chart-visits" height="120"></canvas>
    </div>
  </div>

  <!-- Funnel -->
  <div class="card">
    <div class="card-title">转化漏斗</div>
    <div style="display:flex;gap:0;align-items:stretch" id="funnel">
      <!-- rendered by JS -->
    </div>
  </div>

  <!-- Campaign breakdown -->
  <div class="card">
    <div class="card-title">各推广项目明细</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>项目名称</th>
            <th>平台</th>
            <th>点击</th>
            <th>访问</th>
            <th>转化</th>
            <th>发送消息</th>
            <th>新增订阅</th>
          </tr>
        </thead>
        <tbody id="camp-table">
          <tr><td colspan="7"><div class="empty-state">加载中...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0">
    数据由 CL SDN BHD 追踪系统提供 · 每日自动更新
  </div>
</div>

<div class="loading" id="loading-screen">⏳ 正在载入报告...</div>

<script>
const token = localStorage.getItem('cl_token');
if (!token) { window.location.href = '/portal'; }

let currentDays = 30;
let clickChart = null, visitChart = null;
let clientData = null; // for KPI calculations

function logout() {
  localStorage.clear();
  window.location.href = '/portal';
}

function setDays(d, btn) {
  currentDays = d;
  document.querySelectorAll('.range-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadStats();
}

async function apiFetch(url) {
  const res = await fetch(url, { headers: { 'x-session-token': token } });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

function fmt(n) { return Number(n || 0).toLocaleString(); }
function setText(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }

async function loadStats() {
  const data = await apiFetch(`/portal/stats?days=${currentDays}`);
  if (!data) return;
  clientData = data;

  const t = data.totals;

  setText('s-clicks', fmt(t.clicks));
  setText('s-visits', fmt(t.visits));
  setText('s-leads',  fmt(t.leads));
  setText('s-conv',   fmt(t.conversions));

  // KPIs — spend from localStorage (set during login response)
  // For now we show estimate; in future admin can set actual spend
  const spend = parseFloat(localStorage.getItem('cl_spend') || 0);
  const avgOrderValue = 200; // RM 200 estimated average client order value
  const estimatedRevenue = t.conversions * avgOrderValue;

  if (spend > 0) {
    setText('kpi-spend', `RM ${fmt(spend)}`);
    const roas = (estimatedRevenue / spend).toFixed(2);
    const roi  = (((estimatedRevenue - spend) / spend) * 100).toFixed(1);
    const cpc  = t.clicks  > 0 ? `RM ${(spend / t.clicks).toFixed(2)}`  : '—';
    const cpa  = t.conversions > 0 ? `RM ${(spend / t.conversions).toFixed(2)}` : '—';
    setText('kpi-roas', roas + 'x');
    setText('kpi-roi',  roi + '%');
    setText('kpi-cpc',  cpc);
    setText('kpi-cpa',  cpa);
  } else {
    setText('kpi-spend', '联系客服设置');
    const ctr = t.clicks > 0 ? ((t.conversions / t.clicks) * 100).toFixed(1) + '%' : '—';
    setText('kpi-roas', '—');
    setText('kpi-roi',  '—');
    setText('kpi-cpc',  '—');
    setText('kpi-cpa',  '—');
  }

  // Charts
  renderChart('chart-clicks', data.dailyClicks, '#f97316', 'rgba(249,115,22,0.1)', '点击');
  renderChart('chart-visits', data.dailyVisits, '#3b82f6', 'rgba(59,130,246,0.1)', '访问');

  // Funnel
  renderFunnel(t);

  // Campaign table
  const tbody = document.getElementById('camp-table');
  const platBadge = { telegram:'badge-blue', facebook:'badge-purple', instagram:'badge-orange', other:'badge-orange' };
  if (!data.campaigns || data.campaigns.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">暂无推广项目数据</div></td></tr>`;
  } else {
    tbody.innerHTML = data.campaigns.map(c => `
      <tr>
        <td><strong>${esc(c.name)}</strong></td>
        <td><span class="badge ${platBadge[c.platform] || 'badge-blue'}">${esc(c.platform)}</span></td>
        <td><strong class="c-orange">${fmt(c.clicks)}</strong></td>
        <td><strong class="c-blue">${fmt(c.visits)}</strong></td>
        <td><strong class="c-green">${fmt(c.conversions)}</strong></td>
        <td>${fmt(c.messages_sent)}</td>
        <td>${fmt(c.new_subscribers)}</td>
      </tr>
    `).join('');
  }
}

function renderChart(id, dataMap, color, fill, label) {
  const labels = Object.keys(dataMap).map(d => d.slice(5));
  const values = Object.values(dataMap);
  const ctx = document.getElementById(id).getContext('2d');
  if (id === 'chart-clicks' && clickChart) clickChart.destroy();
  if (id === 'chart-visits' && visitChart) visitChart.destroy();
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{ label, data: values, borderColor: color, backgroundColor: fill, borderWidth: 2, fill: true, tension: 0.4, pointRadius: 2 }],
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', maxTicksLimit: 8 } },
        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#64748b', precision: 0 } },
      },
    },
  });
  if (id === 'chart-clicks') clickChart = chart;
  else visitChart = chart;
}

function renderFunnel(t) {
  const steps = [
    { label: '消息发送', value: t.messages_sent, color: '#64748b' },
    { label: '链接点击', value: t.clicks,         color: '#f97316' },
    { label: '网站访问', value: t.visits,          color: '#3b82f6' },
    { label: '询问/表单', value: t.leads,          color: '#a855f7' },
    { label: '成功转化', value: t.conversions,     color: '#22c55e' },
  ].filter(s => s.value > 0 || s.label === '链接点击');

  const max = Math.max(...steps.map(s => s.value), 1);
  const el  = document.getElementById('funnel');
  el.innerHTML = steps.map((s, i) => {
    const pct = Math.round((s.value / max) * 100);
    const rate = i > 0 && steps[i-1].value > 0
      ? ' (' + ((s.value / steps[i-1].value) * 100).toFixed(1) + '%)'
      : '';
    return `
      <div style="flex:1;text-align:center;padding:0 4px">
        <div style="font-size:11px;color:#64748b;margin-bottom:6px">${s.label}</div>
        <div style="height:80px;display:flex;align-items:flex-end;justify-content:center">
          <div style="width:60%;background:${s.color};border-radius:6px 6px 0 0;height:${pct}%;min-height:4px;opacity:0.85"></div>
        </div>
        <div style="font-size:16px;font-weight:800;color:${s.color};margin-top:6px">${fmt(s.value)}</div>
        <div style="font-size:10px;color:#64748b">${rate}</div>
      </div>
    `;
  }).join('<div style="display:flex;align-items:center;color:#334155;font-size:16px;padding-top:20px">›</div>');
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Init
async function init() {
  const me = await apiFetch('/auth/me');
  if (!me) return;
  setText('client-name-nav', me.name);
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  await loadStats();
}

init();
</script>
</body>
</html>
