<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADS REPORT — CL SDN BHD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a14; --bg2: #13131f; --bg3: #1c1c2e;
      --border: rgba(255,255,255,0.08);
      --text: #f1f5f9; --muted: #64748b;
      --orange: #f97316; --green: #22c55e; --red: #ef4444;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 400px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center;
    }
    .logo-badge {
      width: 40px; height: 40px; border-radius: 10px; background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 14px; color: #fff;
    }
    .logo-name { font-weight: 700; font-size: 16px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
    .sub { color: var(--muted); font-size: 13px; text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px; color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(249,115,22,0.5); }
    .btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: var(--orange); color: #fff; font-weight: 700; font-size: 14px;
      cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red);
      margin-bottom: 16px; display: none;
    }
    .footer-note {
      text-align: center; color: var(--muted); font-size: 12px; margin-top: 24px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-badge">CL</div>
    <span class="logo-name">CL SDN BHD</span>
  </div>
  <h1>ADS REPORT</h1>
  <p class="sub">登入查看你的广告数据报告</p>

  <div class="error" id="error-msg"></div>

  <form id="login-form">
    <div class="form-group">
      <label>账号 (Username)</label>
      <input type="text" id="username" placeholder="你的账号" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>密码 (Password)</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="login-btn">登入</button>
  </form>

  <p class="footer-note">账号由 CL SDN BHD 在你下单后自动创建<br>如有问题请 WhatsApp 联系我们</p>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('cl_token')) {
    window.location.href = '/portal/dashboard';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = '登入中...';
    errEl.style.display = 'none';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('username').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '登入失败');

      localStorage.setItem('cl_token',     data.token);
      localStorage.setItem('cl_client_id', data.client_id);
      localStorage.setItem('cl_name',      data.name);
      window.location.href = '/portal/dashboard';
    } catch (err) {
      errEl.textContent = '❌ ' + err.message;
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '登入';
    }
  });
</script>
</body>
</html>
